<!DOCTYPE html>
<html lang="zh-Hant">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MARK Storyboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body {
      background: #0b0b0b;
      color: white;
      overflow: hidden;
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 999px;
    }

    .shot-active {
      background: #ffffff15;
      border-color: #ffffff50;
    }

    textarea::-webkit-scrollbar {
      width: 6px;
    }

    textarea::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 999px;
    }

  </style>

</head>

<body>

  <div class="flex h-screen">

    <!-- SIDEBAR -->

    <aside
      class="
        w-[220px]
        border-r
        border-zinc-800
        flex
        flex-col
      "
    >

      <div class="p-5 border-b border-zinc-800">

        <h1 class="text-2xl font-bold">
          MARK
        </h1>

        <p class="text-zinc-400 text-sm mt-1">
          Storyboard Viewer
        </p>

      </div>

      <div
        id="shotList"
        class="
          flex-1
          overflow-y-auto
          sidebar-scroll
          p-3
          space-y-1
        "
      >
      </div>

    </aside>

    <!-- MAIN -->

    <main class="flex-1 overflow-y-auto">

      <div class="max-w-6xl mx-auto p-8">

        <!-- TOP -->

        <div class="mb-6">

          <div class="text-zinc-400 text-sm mb-2">
            CURRENT SHOT
          </div>

          <h2
            id="sceneTitle"
            class="text-5xl font-bold"
          >
          </h2>

        </div>

        <!-- MAIN IMAGE -->

        <div
          class="
            relative
            w-full
            aspect-video
            bg-zinc-900
            rounded-3xl
            overflow-hidden
            border
            border-zinc-800
            mb-8
          "
        >

          <img
            id="mainImage"
            src=""
            class="w-full h-full object-cover"
          />

          <!-- IMAGE UPLOAD -->

          <div
            class="
              absolute
              bottom-4
              right-4
              z-20
            "
          >

            <label
              class="
                bg-black/70
                hover:bg-black
                px-4
                py-2
                rounded-xl
                text-sm
                cursor-pointer
                transition
                border
                border-zinc-700
              "
            >

              Upload Image

              <input
                type="file"
                id="imageUpload"
                accept="image/*"
                class="hidden"
              />

            </label>

          </div>

        </div>

        <!-- META -->

        <div class="grid grid-cols-4 gap-4 mb-8">

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Shot Type
            </div>

            <div
              id="shotType"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Duration
            </div>

            <div
              id="duration"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Camera
            </div>

            <div
              id="cameraMovement"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Scene
            </div>

            <div
              id="scene"
              class="text-xl font-semibold"
            >
            </div>

          </div>

        </div>

        <!-- DESCRIPTION -->

        <section
          class="
            bg-zinc-900
            border
            border-zinc-800
            rounded-3xl
            p-6
            mb-6
          "
        >

          <h3 class="text-2xl font-bold mb-4">
            Description
          </h3>

          <textarea
            id="description"
            class="
              w-full
              bg-transparent
              text-zinc-300
              text-lg
              leading-relaxed
              outline-none
              resize-y
              min-h-[180px]
            "
          ></textarea>

        </section>

        <!-- OVERHEAD DIAGRAM -->

        <section
          class="
            bg-zinc-900
            border
            border-zinc-800
            rounded-3xl
            p-6
            mb-6
          "
        >

          <div class="flex items-center justify-between mb-4">

            <h3 class="text-2xl font-bold">
              Overhead Diagram
            </h3>

            <label
              class="
                bg-zinc-800
                hover:bg-zinc-700
                px-4
                py-2
                rounded-xl
                text-sm
                cursor-pointer
                transition
              "
            >

              Upload Diagram

              <input
                type="file"
                id="diagramUpload"
                accept="image/*"
                class="hidden"
              />

            </label>

          </div>

          <div
            class="
              aspect-video
              rounded-2xl
              overflow-hidden
              border
              border-zinc-800
              bg-black
            "
          >

            <img
              id="overheadImage"
              src=""
              class="w-full h-full object-contain"
            />

          </div>

        </section>

        <!-- DETAILS -->

        <div class="grid grid-cols-2 gap-6">

          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Action
            </h3>

            <textarea
              id="action"
              class="
                w-full
                bg-transparent
                text-zinc-300
                leading-relaxed
                outline-none
                resize-y
                min-h-[160px]
              "
            ></textarea>

          </section>

          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Edit
            </h3>

            <textarea
              id="edit"
              class="
                w-full
                bg-transparent
                text-zinc-300
                leading-relaxed
                outline-none
                resize-y
                min-h-[160px]
              "
            ></textarea>

          </section>

          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Dialogue
            </h3>

            <textarea
              id="dialogue"
              class="
                w-full
                bg-transparent
                text-zinc-300
                leading-relaxed
                outline-none
                resize-y
                min-h-[160px]
              "
            ></textarea>

          </section>

          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Prompt
            </h3>

            <textarea
              id="prompt"
              class="
                w-full
                bg-transparent
                text-zinc-400
                text-sm
                leading-relaxed
                outline-none
                resize-y
                min-h-[220px]
              "
            ></textarea>

          </section>

        </div>

      </div>

    </main>

  </div>

  <!-- SAVE BUTTON -->

  <button
    id="saveButton"
    class="
      fixed
      bottom-6
      right-6
      bg-blue-600
      hover:bg-blue-500
      px-6
      py-3
      rounded-2xl
      font-semibold
      shadow-xl
      transition
      z-50
    "
  >
    Save Shot
  </button>

<script>

let shots = []
let currentShot = null

const shotList =
  document.getElementById('shotList')

const mainImage =
  document.getElementById('mainImage')

const overheadImage =
  document.getElementById('overheadImage')

const diagramUpload =
  document.getElementById('diagramUpload')

const imageUpload =
  document.getElementById('imageUpload')

const saveButton =
  document.getElementById('saveButton')

const sceneTitle =
  document.getElementById('sceneTitle')

const shotType =
  document.getElementById('shotType')

const duration =
  document.getElementById('duration')

const cameraMovement =
  document.getElementById('cameraMovement')

const scene =
  document.getElementById('scene')

const description =
  document.getElementById('description')

const action =
  document.getElementById('action')

const edit =
  document.getElementById('edit')

const dialogue =
  document.getElementById('dialogue')

const prompt =
  document.getElementById('prompt')

// LOAD SHOTS

async function loadShots() {

  const manifestRes =
    await fetch('./shots/manifest.json')

  const manifest =
    await manifestRes.json()

  const shotPromises =
    manifest.map(async (fileName) => {

      const res =
        await fetch(`./shots/${fileName}.json`)

      return await res.json()

    })

  shots =
    await Promise.all(shotPromises)

  renderSidebar()

  renderShot(shots[0])

}

// SIDEBAR

function renderSidebar() {

  shotList.innerHTML = ''

  shots.forEach((shot, index) => {

    const item =
      document.createElement('button')

    item.className = `
      w-full
      text-left
      px-3
      py-2
      rounded-lg
      text-sm
      hover:bg-zinc-800
      transition
    `

    item.innerHTML = `
      <div class="font-medium tracking-wide">
        ${shot.id}
      </div>
    `

    item.onclick = () => {

      document
        .querySelectorAll('#shotList button')
        .forEach(btn =>
          btn.classList.remove('shot-active')
        )

      item.classList.add('shot-active')

      renderShot(shot)

    }

    shotList.appendChild(item)

    if (index === 0) {
      item.classList.add('shot-active')
    }

  })

}

// IMAGE PATHS

function getImagePath(shotId) {

  return `./images/${shotId
    .toLowerCase()}.png`

}

function getDiagramPath(shotId) {

  return `./diagrams/${shotId
    .toLowerCase()}.png`

}

// IMAGE FALLBACK

function setImageWithFallback(imgElement, src) {

  imgElement.onerror = () => {

    imgElement.src =
      './images/placeholder.jpg'

  }

  imgElement.src =
    `${src}?t=${Date.now()}`

}

// RENDER SHOT

async function renderShot(shot) {

  currentShot = shot

  setImageWithFallback(
    mainImage,
    getImagePath(shot.id)
  )

  overheadImage.onerror = () => {
    overheadImage.src = ''
  }

  overheadImage.src =
    `${getDiagramPath(shot.id)}?t=${Date.now()}`

  sceneTitle.textContent =
    shot.id || ''

  shotType.textContent =
    shot.shotType || '-'

  duration.textContent =
    shot.duration || '-'

  cameraMovement.textContent =
    shot.cameraMovement || '-'

  scene.textContent =
    shot.scene || '-'

  description.value =
    shot.description || ''

  action.value =
    shot.action || ''

  edit.value =
    shot.edit || ''

  dialogue.value =
    shot.dialogue || ''

  prompt.value =
    shot.prompt || ''

}

// SAVE JSON

saveButton.addEventListener('click', async () => {

  if (!currentShot) return

  currentShot.description =
    description.value

  currentShot.action =
    action.value

  currentShot.edit =
    edit.value

  currentShot.dialogue =
    dialogue.value

  currentShot.prompt =
    prompt.value

  try {

    const response =
      await fetch('/api/save-json', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({

          shotId: currentShot.id,

          data: currentShot

        })

      })

    if (!response.ok) {
      throw new Error('Save failed')
    }

    saveButton.innerText = 'Saved'

    setTimeout(() => {

      saveButton.innerText =
        'Save Shot'

    }, 1500)

  } catch (err) {

    console.error(err)

    saveButton.innerText = 'Error'

  }

})

// MAIN IMAGE UPLOAD

// MAIN IMAGE UPLOAD

imageUpload.addEventListener('change', async (e) => {

  const file = e.target.files[0]

  if (!file || !currentShot) return

  const formData = new FormData()

  formData.append('file', file)

  formData.append(
    'path',
    `images/${currentShot.id.toLowerCase()}.png`
  )

  try {

    const response =
      await fetch('/api/save-shot', {

        method: 'POST',

        body: formData

      })

    if (!response.ok) {

      throw new Error('Upload failed')

    }

    setTimeout(() => {

      mainImage.src =
        `${getImagePath(currentShot.id)}?t=${Date.now()}`

    }, 2000)

  } catch (err) {

    console.error(err)

    alert('Upload failed')

  }

})

// DIAGRAM UPLOAD

// DIAGRAM UPLOAD

diagramUpload.addEventListener('change', async (e) => {

  const file = e.target.files[0]

  if (!file || !currentShot) return

  const formData = new FormData()

  formData.append('file', file)

  formData.append(
    'path',
    `diagrams/${currentShot.id.toLowerCase()}.png`
  )

  try {

    const response =
      await fetch('/api/save-shot', {

        method: 'POST',

        body: formData

      })

      if (!response.ok) {

        const text =
          await response.text()

        console.error(text)

        throw new Error(text)

      }

    setTimeout(() => {

      overheadImage.src =
        `${getDiagramPath(currentShot.id)}?t=${Date.now()}`

    }, 2000)

  } catch (err) {

    console.error(err)

    alert(
      'Diagram upload failed'
    )

  }

})

// START

loadShots()

</script>

</body>
</html>
