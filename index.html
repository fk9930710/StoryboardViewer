<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MARK Storyboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body {
      background: #0b0b0b;
      color: white;
      overflow: hidden;
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 999px;
    }

    .shot-active {
      background: #ffffff15;
      border-color: #ffffff50;
    }

  </style>

</head>

<body>

  <div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside
      class="
        w-[280px]
        border-r
        border-zinc-800
        flex
        flex-col
      "
    >

      <!-- HEADER -->
      <div class="p-5 border-b border-zinc-800">

        <h1 class="text-2xl font-bold">
          MARK
        </h1>

        <p class="text-zinc-400 text-sm mt-1">
          Storyboard Viewer
        </p>

      </div>

      <!-- SHOT LIST -->
      <div
        id="shotList"
        class="
          flex-1
          overflow-y-auto
          sidebar-scroll
          p-3
          space-y-2
        "
      >
      </div>

    </aside>

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto">

      <div class="max-w-6xl mx-auto p-8">

        <!-- TOP -->
        <div class="flex items-start justify-between mb-6">

          <div>

            <div class="text-zinc-400 text-sm mb-2">
              CURRENT SHOT
            </div>

            <h2
              id="sceneTitle"
              class="text-5xl font-bold"
            >
            </h2>

          </div>

          <div
            id="statusBadge"
            class="
              bg-zinc-700
              px-4
              py-2
              rounded-full
              text-sm
              font-semibold
            "
          >
          </div>

        </div>

        <!-- IMAGE -->
        <div
          class="
            relative
            w-full
            aspect-video
            bg-zinc-900
            rounded-3xl
            overflow-hidden
            border
            border-zinc-800
            mb-8
          "
        >

          <img
            id="mainImage"
            src=""
            class="w-full h-full object-cover"
          />

          <!-- UPLOAD UI -->
          <div
            class="
              absolute
              bottom-4
              right-4
              flex
              gap-2
            "
          >

            <label
              class="
                bg-black/70
                hover:bg-black
                px-4
                py-2
                rounded-xl
                text-sm
                cursor-pointer
                transition
                border
                border-zinc-700
              "
            >

              Upload Image

              <input
                type="file"
                id="imageUpload"
                accept="image/*"
                class="hidden"
              />

            </label>

            <button
              id="clearImage"
              class="
                bg-red-500/80
                hover:bg-red-500
                px-4
                py-2
                rounded-xl
                text-sm
                transition
              "
            >
              Clear
            </button>

          </div>

        </div>

        <!-- META -->
        <div class="grid grid-cols-4 gap-4 mb-8">

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Shot Type
            </div>

            <div
              id="shotType"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Duration
            </div>

            <div
              id="duration"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Camera
            </div>

            <div
              id="cameraMovement"
              class="text-xl font-semibold"
            >
            </div>

          </div>

          <div class="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">

            <div class="text-zinc-400 text-sm mb-1">
              Scene
            </div>

            <div
              id="scene"
              class="text-xl font-semibold"
            >
            </div>

          </div>

        </div>

        <!-- DESCRIPTION -->
        <section
          class="
            bg-zinc-900
            border
            border-zinc-800
            rounded-3xl
            p-6
            mb-6
          "
        >

          <h3 class="text-2xl font-bold mb-4">
            Description
          </h3>

          <p
            id="description"
            class="
              text-zinc-300
              text-lg
              leading-relaxed
            "
          >
          </p>

        </section>

        <!-- DETAILS -->
        <div class="grid grid-cols-2 gap-6">

          <!-- ACTION -->
          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Action
            </h3>

            <p
              id="action"
              class="text-zinc-300 leading-relaxed"
            >
            </p>

          </section>

          <!-- EDIT -->
          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Edit
            </h3>

            <p
              id="edit"
              class="text-zinc-300 leading-relaxed"
            >
            </p>

          </section>

          <!-- DIALOGUE -->
          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Dialogue
            </h3>

            <p
              id="dialogue"
              class="text-zinc-300 leading-relaxed"
            >
            </p>

          </section>

          <!-- PROMPT -->
          <section
            class="
              bg-zinc-900
              border
              border-zinc-800
              rounded-3xl
              p-6
            "
          >

            <h3 class="text-xl font-bold mb-4">
              Prompt
            </h3>

            <p
              id="prompt"
              class="
                text-zinc-400
                text-sm
                whitespace-pre-wrap
                leading-relaxed
              "
            >
            </p>

          </section>

        </div>

      </div>

    </main>

  </div>

  <script>

    let shots = []
    let currentShot = null
    let db = null


    // DOM

    const shotList =
      document.getElementById('shotList')

    const mainImage =
      document.getElementById('mainImage')

    const sceneTitle =
      document.getElementById('sceneTitle')

    const shotType =
      document.getElementById('shotType')

    const duration =
      document.getElementById('duration')

    const cameraMovement =
      document.getElementById('cameraMovement')

    const scene =
      document.getElementById('scene')

    const description =
      document.getElementById('description')

    const action =
      document.getElementById('action')

    const edit =
      document.getElementById('edit')

    const dialogue =
      document.getElementById('dialogue')

    const prompt =
      document.getElementById('prompt')

    const statusBadge =
      document.getElementById('statusBadge')

    const imageUpload =
      document.getElementById('imageUpload')

    const clearImage =
      document.getElementById('clearImage')


    // ========================
    // INDEXED DB
    // ========================

    const request =
      indexedDB.open('StoryboardViewerDB', 1)

    request.onupgradeneeded = (event) => {

      db = event.target.result

      if (!db.objectStoreNames.contains('images')) {

        db.createObjectStore('images')

      }

    }

    request.onsuccess = (event) => {

      db = event.target.result

      loadShots()

    }

    request.onerror = () => {

      console.error('IndexedDB failed')

    }


    // SAVE IMAGE

    function saveImageToDB(shotId, imageData) {

      return new Promise((resolve, reject) => {

        const transaction =
          db.transaction(['images'], 'readwrite')

        const store =
          transaction.objectStore('images')

        const request =
          store.put(imageData, shotId)

        request.onsuccess = () => resolve()

        request.onerror = () => reject()

      })

    }


    // LOAD IMAGE

    function loadImageFromDB(shotId) {

      return new Promise((resolve, reject) => {

        const transaction =
          db.transaction(['images'], 'readonly')

        const store =
          transaction.objectStore('images')

        const request =
          store.get(shotId)

        request.onsuccess = () =>
          resolve(request.result)

        request.onerror = () =>
          reject()

      })

    }


    // DELETE IMAGE

    function deleteImageFromDB(shotId) {

      return new Promise((resolve, reject) => {

        const transaction =
          db.transaction(['images'], 'readwrite')

        const store =
          transaction.objectStore('images')

        const request =
          store.delete(shotId)

        request.onsuccess = () => resolve()

        request.onerror = () => reject()

      })

    }


    // LOAD SHOTS

    async function loadShots() {

      const manifestRes =
        await fetch('./shots/manifest.json')

      const manifest =
        await manifestRes.json()

      const shotPromises =
        manifest.map(async (fileName) => {

          const res =
            await fetch(`./shots/${fileName}.json`)

          return await res.json()

        })

      shots =
        await Promise.all(shotPromises)

      renderSidebar()

      renderShot(shots[0])

    }


    // SIDEBAR

    function renderSidebar() {

      shotList.innerHTML = ''

      shots.forEach((shot, index) => {

        const item =
          document.createElement('button')

        item.className = `
          w-full
          text-left
          bg-zinc-900
          border
          border-zinc-800
          rounded-2xl
          p-4
          hover:bg-zinc-800
          transition
        `

        item.innerHTML = `

          <div class="flex items-center justify-between">

            <div>

              <div class="font-bold text-lg">
                ${shot.id}
              </div>

              <div class="text-zinc-400 text-sm mt-1">
                ${shot.shotType || 'No Shot Type'}
              </div>

            </div>

            <div class="
              w-3
              h-3
              rounded-full
              ${shot.status === 'generated'
                ? 'bg-blue-500'
                : 'bg-zinc-500'
              }
            ">
            </div>

          </div>

        `

        item.onclick = () => {

          document
            .querySelectorAll('#shotList button')
            .forEach(btn =>
              btn.classList.remove('shot-active')
            )

          item.classList.add('shot-active')

          renderShot(shot)

        }

        shotList.appendChild(item)

        if (index === 0) {
          item.classList.add('shot-active')
        }

      })

    }


    // RENDER SHOT

    async function renderShot(shot) {

      currentShot = shot

      mainImage.src =
        shot.image || ''

      const savedImage =
        await loadImageFromDB(shot.id)

      if (savedImage) {

        mainImage.src = savedImage

      }

      sceneTitle.textContent =
        shot.id || ''

      shotType.textContent =
        shot.shotType || '-'

      duration.textContent =
        shot.duration || '-'

      cameraMovement.textContent =
        shot.cameraMovement || '-'

      scene.textContent =
        shot.scene || '-'

      description.textContent =
        shot.description || ''

      action.textContent =
        shot.action || ''

      edit.textContent =
        shot.edit || ''

      dialogue.textContent =
        shot.dialogue || ''

      prompt.textContent =
        shot.prompt || ''

      statusBadge.textContent =
        shot.status || 'draft'

    }


    // IMAGE UPLOAD

    imageUpload.addEventListener('change', (e) => {

      const file = e.target.files[0]

      if (!file || !currentShot) return

      const reader = new FileReader()

      reader.onload = async () => {

        const imageData = reader.result

        mainImage.src = imageData

        await saveImageToDB(
          currentShot.id,
          imageData
        )
        

      }

      reader.readAsDataURL(file)

    })


    // CLEAR IMAGE

    clearImage.addEventListener('click', async () => {

      if (!currentShot) return

      await deleteImageFromDB(currentShot.id)

      mainImage.src =
        currentShot.image || ''

    })


    // KEYBOARD NAVIGATION

    document.addEventListener('keydown', (e) => {

      if (!currentShot) return

      const currentIndex =
        shots.findIndex(
          shot => shot.id === currentShot.id
        )

      if (e.key === 'ArrowDown') {

        const nextShot =
          shots[currentIndex + 1]

        if (nextShot) {

          renderShot(nextShot)

          updateSidebarSelection(nextShot.id)

        }

      }

      if (e.key === 'ArrowUp') {

        const prevShot =
          shots[currentIndex - 1]

        if (prevShot) {

          renderShot(prevShot)

          updateSidebarSelection(prevShot.id)

        }

      }

    })


    // SIDEBAR ACTIVE UPDATE

    function updateSidebarSelection(shotId) {

      const buttons =
        document.querySelectorAll('#shotList button')

      buttons.forEach(btn => {

        btn.classList.remove('shot-active')

        if (btn.innerText.includes(shotId)) {

          btn.classList.add('shot-active')

          btn.scrollIntoView({
            block: 'nearest'
          })

        }

      })

    }

  </script>

</body>

</html>
