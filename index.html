<!DOCTYPE html>
<html lang="zh-Hant">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MARK Storyboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <div class="app-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-header">

        <h1 class="site-title">
          MARK
        </h1>

        <p class="site-subtitle">
          Storyboard Viewer
        </p>

      </div>

      <div class="sidebar-actions">

        <button
          id="allShotsButton"
          class="sidebar-button"
        >
          All Shots
        </button>

      </div>
      <div class="language-switcher">

        <button
          id="langZh"
          class="language-button"
        >
          中文
        </button>

        <button
          id="langKo"
          class="language-button"
        >
          한국어
        </button>

      </div>
      <div
        id="shotList"
        class="shot-list sidebar-scroll"
      >
      </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

      <!-- ALL SHOTS -->

      <div
          id="allShotsView"
          class="all-shots-view hidden"
        >

          <div class="all-shots-header">

            <h2 class="all-shots-title">
              All Shots
            </h2>

          </div>

          <div
            id="allShotsGrid"
            class="all-shots-grid"
          >
          </div>

        </div>

      <!-- SINGLE SHOT -->

      <div
        id="singleShotView"
        class="single-shot-view"
      >

        <!-- HEADER -->

        <div class="page-header">

          <div class="page-label">
            CURRENT SHOT
          </div>

          <h2
            id="sceneTitle"
            class="scene-title"
          >
          </h2>

        </div>

        <!-- MAIN IMAGE -->

        <div class="main-image-wrapper">

          <img
            id="mainImage"
            src=""
            class="main-image"
          />

        </div>

        <!-- DIAGRAM OVERLAY -->

        <div
          id="diagramOverlay"
          class="diagram-overlay hidden"
        >

          <img
            id="diagramImage"
            src=""
            class="diagram-image"
          />

        </div>

        <!-- META -->

        <div class="meta-grid">

          <div class="meta-card">

            <div class="meta-label">
              Shot Type
            </div>

            <div
              id="shotType"
              class="meta-value"
            >
            </div>

          </div>

          <div class="meta-card">

            <div class="meta-label">
              Duration
            </div>

            <div
              id="duration"
              class="meta-value"
            >
            </div>

          </div>

          <div class="meta-card">

            <div class="meta-label">
              Camera
            </div>

            <div
              id="cameraMovement"
              class="meta-value"
            >
            </div>

          </div>

          <div class="meta-card">

            <div class="meta-label">
              Scene
            </div>

            <div
              id="scene"
              class="meta-value"
            >
            </div>

          </div>

        </div>

        <!-- DESCRIPTION -->

        <section class="content-card">

          <h3 class="section-title">
            Description
          </h3>

          <textarea
            id="description"
            class="storyboard-textarea textarea-large"
          ></textarea>

        </section>

        <!-- DETAILS -->

        <div class="details-grid">

          <section class="content-card">

            <h3 class="section-title">
              Action
            </h3>

            <textarea
              id="action"
              class="storyboard-textarea textarea-medium"
            ></textarea>

          </section>

          <section class="content-card">

            <h3 class="section-title">
              Edit
            </h3>

            <textarea
              id="edit"
              class="storyboard-textarea textarea-medium"
            ></textarea>

          </section>

          <section class="content-card">

            <h3 class="section-title">
              Dialogue
            </h3>

            <textarea
              id="dialogue"
              class="storyboard-textarea textarea-medium"
            ></textarea>

          </section>

          <section class="content-card">

            <h3 class="section-title">
              Prompt
            </h3>

            <textarea
              id="prompt"
              class="storyboard-textarea textarea-prompt"
            ></textarea>

          </section>

        </div>

      </div>

    </main>

  </div>

  <script src="./js/script.js"></script>

</body>

</html>
